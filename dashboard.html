<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camden's BDR Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1419; color: #e8eaed; padding: 24px; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #2a3038; }
  .header h1 { font-size: 24px; font-weight: 600; }
  .subtitle { font-size: 13px; color: #8b95a3; margin-top: 4px; }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .stat { text-align: right; font-size: 12px; color: #8b95a3; }
  .stat strong { color: #e8eaed; font-size: 14px; }
  .refresh-btn { background: #1d4e89; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .refresh-btn:hover { background: #2563a8; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #2a3038; }
  .tab { padding: 10px 18px; background: none; border: none; color: #8b95a3; cursor: pointer; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; }
  .tab:hover { color: #e8eaed; }
  .tab.active { color: #e8eaed; border-bottom-color: #4a9eff; }
  .tab .count { background: #2a3038; color: #8b95a3; padding: 2px 7px; border-radius: 10px; font-size: 11px; margin-left: 6px; }
  .tab.active .count { background: #4a9eff; color: #0f1419; }
  .tab.has-queue .count { background: #d97706; color: white; }
  .section-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8b95a3; margin: 24px 0 10px 2px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .section-header.rollover { color: #d97757; }
  .section-header.queue { color: #fbbf24; font-size: 13px; }
  .section-header .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .section-header .help-text { font-size: 11px; text-transform: none; letter-spacing: normal; color: #6b7280; font-weight: normal; margin-left: 8px; font-style: italic; }
  .card { background: #1a1f26; border: 1px solid #2a3038; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; position: relative; }
  .card:hover { border-color: #3a424d; }
  .card.completed { display: none; }
  .card.dismissed { display: none; }
  body.show-hidden-tasks .card.completed[data-bucket="tasks"],
  body.show-hidden-tasks .card.completed[data-bucket="rollover"],
  body.show-hidden-tasks .card.dismissed[data-bucket="tasks"],
  body.show-hidden-tasks .card.dismissed[data-bucket="rollover"] { display: block; opacity: 0.45; }
  body.show-hidden-review .card.completed[data-bucket="review"],
  body.show-hidden-review .card.dismissed[data-bucket="review"] { display: block; opacity: 0.45; }
  body.show-hidden-fyi .card.completed[data-bucket="fyi"],
  body.show-hidden-fyi .card.dismissed[data-bucket="fyi"] { display: block; opacity: 0.45; }
  .card.completed .task-title { text-decoration: line-through; }
  .card.dismissed .task-title { text-decoration: line-through; color: #8b95a3; }
  .dismiss-btn { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: #6b7280; font-size: 16px; cursor: pointer; padding: 2px 8px; border-radius: 4px; line-height: 1; opacity: 0; transition: opacity 0.15s; }
  .card:hover .dismiss-btn { opacity: 1; }
  .dismiss-btn:hover { background: #2a3038; color: #dc2626; }
  .restore-btn { background: #2a3038; border: 1px solid #3a424d; color: #8b95a3; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 8px; }
  .restore-btn:hover { color: #e8eaed; border-color: #4a5563; }
  .hidden-toggle { background: transparent; border: 1px solid #3a424d; color: #6b7280; font-size: 10px; padding: 2px 9px; border-radius: 10px; cursor: pointer; text-transform: none; letter-spacing: normal; font-weight: normal; margin-left: 10px; }
  .hidden-toggle:hover { color: #e8eaed; border-color: #4a5563; }
  .hidden-toggle.active { color: #fbbf24; border-color: #fbbf24; }
  .card.queue-card { border-color: #d97706; background: #1f1a14; }
  .card.queue-card:hover { border-color: #fbbf24; }
  .card.low-conf { border-left: 3px solid #dc2626; }
  .card.medium-conf { border-left: 3px solid #fbbf24; }
  .card-row { display: flex; align-items: flex-start; gap: 12px; }
  .checkbox { width: 18px; height: 18px; border: 1.5px solid #4a5563; border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; }
  .checkbox.checked { background: #4a9eff; border-color: #4a9eff; }
  .checkbox.checked::after { content: "✓"; color: white; font-size: 12px; font-weight: bold; }
  .card-body { flex: 1; min-width: 0; }
  .card-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.source-slack { background: #4a154b; color: #f0c5f0; }
  .badge.source-gmail { background: #c5221f; color: white; }
  .badge.source-hubspot { background: #ff7a59; color: white; }
  .badge.source-granola { background: #6b46c1; color: white; }
  .badge.source-nooks { background: #0f766e; color: white; }
  .badge.priority-p1 { background: #dc2626; color: white; }
  .badge.priority-p2 { background: #d97706; color: white; }
  .badge.priority-p3 { background: #2563eb; color: white; }
  .badge.priority-p4 { background: #4b5563; color: white; }
  .badge.from-ryan { background: #1d4e89; color: #a8d5ff; }
  .badge.from-internal { background: #065f46; color: #a7f3d0; }
  .badge.deadline { background: transparent; border: 1px solid #d97706; color: #fbbf24; }
  .confidence-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #8b95a3; margin-left: auto; }
  .confidence-dot { width: 8px; height: 8px; border-radius: 50%; }
  .confidence-dot.high { background: #10b981; }
  .confidence-dot.medium { background: #fbbf24; }
  .confidence-dot.low { background: #dc2626; }
  .task-title { font-size: 14px; font-weight: 500; color: #e8eaed; line-height: 1.4; margin-bottom: 6px; }
  .task-context { font-size: 12px; color: #8b95a3; line-height: 1.5; background: #0f1419; padding: 8px 10px; border-radius: 4px; border-left: 2px solid #4a5563; margin: 8px 0; font-style: italic; }
  .task-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .action-btn { background: #2a3038; border: 1px solid #3a424d; color: #e8eaed; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .action-btn:hover { background: #3a424d; }
  .action-btn.primary { background: #1d4e89; border-color: #1d4e89; }
  .action-btn.primary:hover { background: #2563a8; }
  .answer-buttons { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .answer-btn { background: #2a3038; border: 1px solid #d97706; color: #fbbf24; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; }
  .answer-btn:hover { background: #d97706; color: #0f1419; }
  .answer-btn.suggested { background: #d97706; color: #0f1419; font-weight: 600; }
  .answer-btn.suggested:hover { background: #fbbf24; }
  .draft-box { margin-top: 10px; background: #0f1419; border: 1px solid #2a3038; border-radius: 6px; padding: 12px; display: none; }
  .draft-box.open { display: block; }
  .draft-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #8b95a3; margin-bottom: 6px; font-weight: 600; }
  .draft-content { font-size: 13px; line-height: 1.6; color: #d8dde4; white-space: pre-wrap; }
  .draft-actions { margin-top: 10px; display: flex; gap: 8px; }
  .article-summary { margin-top: 10px; background: #0f1419; border-left: 3px solid #6b46c1; padding: 10px 12px; border-radius: 4px; }
  .article-summary .article-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #c4b5fd; }
  .article-summary ul { list-style: none; padding: 0; margin: 6px 0; }
  .article-summary li { font-size: 12px; color: #b8c1cc; padding: 3px 0 3px 16px; position: relative; line-height: 1.5; }
  .article-summary li::before { content: "→"; position: absolute; left: 0; color: #6b46c1; }
  .article-tag { display: inline-block; font-size: 10px; background: #6b46c1; color: white; padding: 2px 7px; border-radius: 4px; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .empty-state { text-align: center; padding: 40px 20px; color: #6b7280; font-size: 13px; }
  .signal-pill { display: inline-block; background: #2a3038; color: #fbbf24; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 4px; margin-top: 4px; }
  .config-banner { background: #d97706; color: #0f1419; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: 500; }
  .loading { text-align: center; padding: 60px 20px; color: #8b95a3; }
  .suggested-label { font-size: 11px; color: #fbbf24; font-style: italic; margin-bottom: 6px; }

  /* Projects sidebar */
  .layout { display: flex; gap: 24px; max-width: 1500px; margin: 0 auto; align-items: flex-start; }
  .sidebar { width: 260px; flex-shrink: 0; position: sticky; top: 24px; }
  .sidebar-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #6b7280; font-weight: 600; padding: 0 4px 12px; }
  .project-card { background: #1a1f26; border: 1px solid #2a3038; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; position: relative; transition: border-color 0.15s; }
  .project-card:hover { border-color: #3a424d; }
  .project-card.complete { opacity: 0.55; }
  .project-card.editing { border-color: #4a9eff; }
  .project-card .pname { font-size: 13px; font-weight: 500; color: #e8eaed; padding-left: 16px; position: relative; }
  .project-card .pname::before { content: ""; position: absolute; left: 0; top: 5px; width: 8px; height: 8px; border-radius: 50%; background: #6b7280; }
  .project-card.priority .pname::before { background: #f97316; }
  .project-card.active .pname::before { background: #10b981; }
  .project-card.standby .pname::before { background: #fbbf24; }
  .project-card.complete .pname::before { background: #6b7280; }
  .project-card .pmeta { font-size: 11px; color: #6b7280; margin-top: 4px; padding-left: 16px; }
  .project-card .psummary { font-size: 11px; color: #9aa4b2; margin-top: 5px; padding-left: 16px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .project-card .psummary .pflag { color: #fbbf24; font-weight: 600; }
  .project-card .pdel { position: absolute; top: 8px; right: 8px; background: transparent; border: none; color: #6b7280; font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 4px; opacity: 0; line-height: 1; }
  .project-card:hover .pdel { opacity: 1; }
  .project-card .pdel:hover { color: #dc2626; background: #2a3038; }
  .project-edit { margin-top: 8px; padding: 10px; background: #0f1419; border: 1px solid #2a3038; border-radius: 6px; }
  .project-edit input, .project-edit textarea, .project-edit select { width: 100%; background: #1a1f26; border: 1px solid #2a3038; color: #e8eaed; padding: 6px 8px; border-radius: 4px; font-size: 12px; font-family: inherit; margin-bottom: 8px; }
  .project-edit textarea { resize: vertical; min-height: 60px; }
  .project-edit .pe-row { display: flex; gap: 6px; margin-top: 4px; }
  .project-edit button { flex: 1; background: #2a3038; border: 1px solid #3a424d; color: #e8eaed; padding: 6px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .project-edit button.primary { background: #1d4e89; border-color: #1d4e89; }
  .project-edit button.primary:hover { background: #2563a8; }
  .project-edit button:hover { background: #3a424d; }
  .add-project-btn { width: 100%; background: #2a3038; border: 1px dashed #3a424d; color: #8b95a3; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 4px; }
  .add-project-btn:hover { color: #e8eaed; border-color: #4a5563; }

  /* Archive view */
  .archive-filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .archive-filter { background: #1a1f26; border: 1px solid #2a3038; color: #8b95a3; padding: 5px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; }
  .archive-filter:hover { color: #e8eaed; border-color: #3a424d; }
  .archive-filter.active { background: #1d4e89; border-color: #1d4e89; color: white; }
  .archive-summary { display: flex; gap: 24px; font-size: 12px; color: #8b95a3; margin-bottom: 16px; padding: 10px 14px; background: #1a1f26; border: 1px solid #2a3038; border-radius: 8px; }
  .archive-summary strong { color: #e8eaed; font-size: 16px; display: block; margin-bottom: 2px; }
  .archive-summary .stat-block { flex: 1; }
  .archive-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 1100px) { .archive-grid { grid-template-columns: 1fr; } }
  .archive-col-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8b95a3; font-weight: 600; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #2a3038; display: flex; justify-content: space-between; align-items: center; }
  .archive-col-header.completed { color: #10b981; }
  .archive-col-header.dismissed { color: #6b7280; }
  .archive-card { background: #1a1f26; border: 1px solid #2a3038; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
  .archive-card .ac-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; font-size: 10px; }
  .archive-card .ac-title { font-size: 13px; color: #e8eaed; margin-bottom: 4px; line-height: 1.3; }
  .archive-card .ac-time { font-size: 11px; color: #6b7280; }
  .archive-card .ac-actions { margin-top: 6px; }
  .archive-card .ac-restore { background: transparent; border: 1px solid #3a424d; color: #8b95a3; padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
  .archive-card .ac-restore:hover { color: #e8eaed; border-color: #4a5563; }
  .badge.bucket-tasks { background: #1d4e89; color: #a8d5ff; }
  .badge.bucket-rollover { background: #92400e; color: #fde68a; }
  .badge.bucket-review { background: #5b21b6; color: #ddd6fe; }
  .badge.bucket-fyi { background: #374151; color: #d1d5db; }
  .badge.bucket-project { background: #064e3b; color: #a7f3d0; }
  .main { flex: 1; min-width: 0; }
  @media (max-width: 900px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; position: static; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">Projects</div>
    <div id="projects-list"><div class="loading" style="padding:20px 0;font-size:12px;">Loading…</div></div>
    <button class="add-project-btn" onclick="startAddProject()">+ Add Project</button>
  </aside>
  <main class="main">
    <div id="config-warning"></div>
    <div class="header">
      <div>
        <h1>BDR Task Board — Camden Riley</h1>
        <div class="subtitle">Waystation AI · <span id="last-refresh">Loading...</span></div>
      </div>
      <div class="header-right">
        <div class="stat">
          <div><strong id="completion-stat">—</strong></div>
          <div>tasks complete</div>
        </div>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="all" onclick="setTab('all')">All</button>
      <button class="tab" data-tab="queue" onclick="setTab('queue')" id="tab-queue">Needs your call <span class="count" id="count-queue">0</span></button>
      <button class="tab" data-tab="tasks" onclick="setTab('tasks')">Tasks <span class="count" id="count-tasks">0</span></button>
      <button class="tab" data-tab="review" onclick="setTab('review')">Review <span class="count" id="count-review">0</span></button>
      <button class="tab" data-tab="fyi" onclick="setTab('fyi')">FYI <span class="count" id="count-fyi">0</span></button>
      <button class="tab" data-tab="archive" onclick="setTab('archive')">Archive <span class="count" id="count-archive">0</span></button>
    </div>

    <div id="board"><div class="loading">Loading from Google Sheet...</div></div>
  </main>
</div>

<script>
// ============================================
// CONFIG — Camden, edit these two values
// ============================================
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTm7L_7iuXDN5TvH8Ex2njYCUiJMHsTlyNcpjDjJWegrYjVeNKMJiYhoXU3BKXyOLstQw7zh2qkGQ_r/pub?gid=0&single=true&output=csv";
const PROJECTS_CSV_URL = "https://docs.google.com/spreadsheets/d/1UlMIporrKLm7cVURyigPtSfDayXYUD6dzkgdYPyc9lQ/export?format=csv&gid=892315479";
const APPS_SCRIPT_WEBHOOK = "https://script.google.com/macros/s/AKfycbze_EgzBFssisDtfZox3Nwk9xJjXYkV7oUgJj4C53UhBMbZZAHmUpaQo8kOQO9HWBgi4A/exec";
// ============================================

let currentTab = "all";
let allItems = [];
let allProjects = [];
let openDrafts = {};
let editingProjectId = null;
let showHidden = { tasks: false, review: false, fyi: false };
let archiveFilter = "month"; // "all" | "month" | "week"

function setArchiveFilter(f) {
  archiveFilter = f;
  render();
}

function withinArchiveWindow(iso) {
  if (archiveFilter === "all") return true;
  if (!iso) return false;
  const t = new Date(iso).getTime();
  if (isNaN(t)) return false;
  const ms = archiveFilter === "week" ? 7 * 86400000 : 30 * 86400000;
  return (Date.now() - t) <= ms;
}

function toggleHidden(section) {
  showHidden[section] = !showHidden[section];
  render();
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelector(`[data-tab="${tab}"]`).classList.add("active");
  render();
}

async function loadData() {
  if (SHEET_CSV_URL.includes("PASTE")) {
    document.getElementById("config-warning").innerHTML =
      '<div class="config-banner">⚙ Setup required: Edit SHEET_CSV_URL at the top of dashboard.html. See setup-checklist.md.</div>';
    document.getElementById("board").innerHTML = '<div class="empty-state">Configure your Google Sheet URL to see live data.</div>';
    return;
  }

  document.getElementById("board").innerHTML = '<div class="loading">Loading from Google Sheet...</div>';
  try {
    const [tasksRes, projectsRes] = await Promise.all([
      fetch(SHEET_CSV_URL + "&t=" + Date.now()),
      fetch(PROJECTS_CSV_URL + "&t=" + Date.now())
    ]);
    const csv = await tasksRes.text();
    allItems = parseCSV(csv);
    if (projectsRes.ok) {
      const pcsv = await projectsRes.text();
      allProjects = parseCSV(pcsv);
    }
    document.getElementById("last-refresh").textContent = "Refreshed " + new Date().toLocaleTimeString();
    render();
    renderProjects();
  } catch (err) {
    document.getElementById("board").innerHTML = `<div class="empty-state">Could not load sheet. Error: ${err.message}</div>`;
  }
}

function timeAgo(iso) {
  if (!iso) return "";
  const then = new Date(iso).getTime();
  if (isNaN(then)) return "";
  const days = Math.floor((Date.now() - then) / 86400000);
  if (days < 1) return "Updated today";
  if (days === 1) return "Updated 1d ago";
  return `Updated ${days}d ago`;
}

function renderProjects() {
  const list = document.getElementById("projects-list");
  if (!list) return;
  const visible = allProjects.filter(p => p.status !== "deleted");
  if (visible.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:20px 0;font-size:12px;">No projects yet.</div>';
    return;
  }
  // Sort: priority first, then active, then standby, then complete
  const order = { priority: 0, active: 1, standby: 2, complete: 3 };
  const sorted = [...visible].sort((a, b) =>
    (order[a.status] ?? 99) - (order[b.status] ?? 99)
  );
  list.innerHTML = sorted.map(p => {
    const status = (p.status || "active").toLowerCase();
    const isEditing = editingProjectId === p.id;
    if (isEditing) {
      return `<div class="project-card ${status} editing">
        <div class="project-edit">
          <input type="text" id="pe-name-${p.id}" value="${escapeHTML(p.name || "")}" placeholder="Project name" />
          <select id="pe-status-${p.id}">
            <option value="priority" ${status === "priority" ? "selected" : ""}>Priority</option>
            <option value="active" ${status === "active" ? "selected" : ""}>Active</option>
            <option value="standby" ${status === "standby" ? "selected" : ""}>Standby</option>
            <option value="complete" ${status === "complete" ? "selected" : ""}>Complete</option>
          </select>
          <textarea id="pe-notes-${p.id}" placeholder="Summary / notes (start with ⚠ … — to flag a risk)">${escapeHTML(p.notes || "")}</textarea>
          <div class="pe-row">
            <button class="primary" onclick="saveProject('${p.id}')">Save</button>
            <button onclick="cancelEditProject()">Cancel</button>
            <button onclick="deleteProject('${p.id}')" style="color:#dc2626">Delete</button>
          </div>
        </div>
      </div>`;
    }
    const summaryHTML = p.notes ? `<div class="psummary">${formatSummary(p.notes)}</div>` : "";
    return `<div class="project-card ${status}" onclick="startEditProject('${p.id}')">
      <button class="pdel" title="Delete" onclick="event.stopPropagation();deleteProject('${p.id}')">×</button>
      <div class="pname">${escapeHTML(p.name || "(untitled)")}</div>
      ${summaryHTML}
      <div class="pmeta">${escapeHTML(timeAgo(p.last_updated))}</div>
    </div>`;
  }).join("");
}

function startEditProject(id) {
  editingProjectId = id;
  renderProjects();
  setTimeout(() => {
    const input = document.getElementById(`pe-name-${id}`);
    if (input) input.focus();
  }, 50);
}

function cancelEditProject() {
  editingProjectId = null;
  renderProjects();
}

async function saveProject(id) {
  const name = document.getElementById(`pe-name-${id}`).value.trim();
  const status = document.getElementById(`pe-status-${id}`).value;
  const notes = document.getElementById(`pe-notes-${id}`).value.trim();
  const p = allProjects.find(x => x.id === id);
  if (!p) return;
  const now = new Date().toISOString();
  p.name = name; p.status = status; p.notes = notes; p.last_updated = now;
  editingProjectId = null;
  renderProjects();
  await postToSheet({ id, target: "projects", name, status, notes, last_updated: now });
}

async function deleteProject(id) {
  if (!confirm("Delete this project?")) return;
  allProjects = allProjects.filter(p => p.id !== id);
  editingProjectId = null;
  renderProjects();
  // Mark as deleted via status field — Apps Script doesn't support row deletion via the webhook,
  // so we set status to "deleted" which we filter out client-side on next render.
  await postToSheet({ id, target: "projects", status: "deleted" });
}

function startAddProject() {
  const name = prompt("New project name:");
  if (!name || !name.trim()) return;
  const newProject = {
    id: crypto.randomUUID(),
    name: name.trim(),
    status: "active",
    notes: "",
    last_updated: new Date().toISOString(),
    created_date: new Date().toISOString()
  };
  allProjects.push(newProject);
  renderProjects();
  postToSheet({
    action: "insert",
    target: "projects",
    row: newProject
  });
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const values = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (values[i] || "").trim(); });
    return obj;
  }).filter(r => r.id);
}

function parseCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (char === "," && !inQuotes) {
      result.push(current);
      current = "";
    } else { current += char; }
  }
  result.push(current);
  return result;
}

async function postToSheet(payload) {
  if (APPS_SCRIPT_WEBHOOK.includes("PASTE")) {
    console.warn("Apps Script webhook not configured");
    return;
  }
  try {
    await fetch(APPS_SCRIPT_WEBHOOK, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch (err) {
    console.error("Failed to save:", err);
  }
}

async function toggleComplete(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  const newStatus = item.status === "done" ? "new" : "done";
  item.status = newStatus;
  item.completed_at = newStatus === "done" ? new Date().toISOString() : "";
  render();
  await postToSheet({ id, status: newStatus, completed_at: item.completed_at });
}

async function dismissItem(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  item.status = "dismissed";
  item.completed_at = new Date().toISOString();
  render();
  await postToSheet({ id, status: "dismissed", completed_at: item.completed_at });
}

async function restoreItem(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  item.status = "new";
  item.completed_at = "";
  render();
  await postToSheet({ id, status: "new", completed_at: "" });
}

async function answerQueue(id, decidedBucket) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  // Move from needs_call to the decided bucket — Cowork will read this and learn
  item.bucket = decidedBucket;
  item.confidence = "high"; // Camden answered, so it's confirmed
  render();
  await postToSheet({ id, bucket: decidedBucket, confidence: "high" });
}

function toggleDraft(id) {
  openDrafts[id] = !openDrafts[id];
  render();
}

function copyDraft(id) {
  const item = allItems.find(i => i.id === id);
  if (!item || !item.draft) return;
  navigator.clipboard.writeText(item.draft);
  const btn = document.getElementById(`copy-${id}`);
  if (btn) { btn.textContent = "✓ Copied"; setTimeout(() => { btn.textContent = "Copy to clipboard"; }, 2000); }
}

function escapeHTML(str) {
  if (!str) return "";
  return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// Render a project summary, highlighting a leading "⚠ … —" flag prefix in amber.
function formatSummary(text) {
  const esc = escapeHTML(text);
  const m = esc.match(/^(⚠[^—]*—)\s*(.*)$/);
  if (m) return `<span class="pflag">${m[1]}</span> ${m[2]}`;
  return esc;
}

function renderQueueCard(item) {
  const sourceLabel = { slack: "Slack", gmail: "Gmail", hubspot: "HubSpot", granola: "Granola", nooks: "Nooks" }[item.source] || item.source;
  const fromRyan = item.from_ryan === "true" || item.from_ryan === "TRUE";
  const fromInternal = item.from_internal === "true" || item.from_internal === "TRUE";
  const suggested = item.suggested_bucket || "tasks";

  return `<div class="card queue-card">
    <div class="card-row">
      <div class="card-body">
        <div class="card-meta">
          <span class="badge source-${item.source}">${sourceLabel}</span>
          ${fromRyan ? '<span class="badge from-ryan">From Ryan</span>' : ""}
          ${!fromRyan && fromInternal ? '<span class="badge from-internal">Internal</span>' : ""}
          <span class="confidence-indicator"><span class="confidence-dot low"></span>Low confidence</span>
        </div>
        <div class="task-title">${escapeHTML(item.title)}</div>
        <div class="task-context">${escapeHTML(item.context)}</div>
        <div class="suggested-label">My best guess: <strong>${suggested.toUpperCase()}</strong> — but I'm not sure. What is this?</div>
        <div class="answer-buttons">
          <button class="answer-btn ${suggested === "tasks" ? "suggested" : ""}" onclick="answerQueue('${item.id}', 'tasks')">Task</button>
          <button class="answer-btn ${suggested === "review" ? "suggested" : ""}" onclick="answerQueue('${item.id}', 'review')">Review</button>
          <button class="answer-btn ${suggested === "fyi" ? "suggested" : ""}" onclick="answerQueue('${item.id}', 'fyi')">FYI</button>
          ${item.source_url ? `<a href="${escapeHTML(item.source_url)}" target="_blank" class="action-btn">↗ See source first</a>` : ""}
        </div>
      </div>
    </div>
  </div>`;
}

function renderCard(item, isTask) {
  const isComplete = item.status === "done";
  const isDismissed = item.status === "dismissed";
  const isHidden = isComplete || isDismissed;
  const sourceLabel = { slack: "Slack", gmail: "Gmail", hubspot: "HubSpot", granola: "Granola", nooks: "Nooks" }[item.source] || item.source;
  const priorityLabel = { p1: "P1 — Today", p2: "P2 — This week", p3: "P3 — When you can", p4: "P4 — Backlog" }[item.priority];
  const fromRyan = item.from_ryan === "true" || item.from_ryan === "TRUE";
  const fromInternal = item.from_internal === "true" || item.from_internal === "TRUE";
  const bucketAttr = item.bucket || (isTask ? "tasks" : "review");

  let confidenceHTML = "";
  let confClass = "";
  if (item.confidence === "low") {
    confidenceHTML = '<span class="confidence-indicator"><span class="confidence-dot low"></span>Low confidence</span>';
    confClass = "low-conf";
  } else if (item.confidence === "medium") {
    confidenceHTML = '<span class="confidence-indicator"><span class="confidence-dot medium"></span>Medium confidence</span>';
    confClass = "medium-conf";
  }

  let signalsHTML = "";
  if (item.signals) {
    signalsHTML = '<div>' + item.signals.split(",").map(s => `<span class="signal-pill">${escapeHTML(s.trim())}</span>`).join("") + '</div>';
  }

  let articleHTML = "";
  if (item.article_summary_json) {
    try {
      const a = JSON.parse(item.article_summary_json);
      articleHTML = `<div class="article-summary">
        <div class="article-title">📄 ${escapeHTML(a.title || "Article")}</div>
        <ul>${(a.bullets || []).map(b => `<li>${escapeHTML(b)}</li>`).join("")}</ul>
        ${a.relevance ? `<div class="article-tag">Why it matters: ${escapeHTML(a.relevance)}</div>` : ""}
      </div>`;
    } catch (e) {}
  }

  let draftHTML = "";
  if (item.draft) {
    const isOpen = openDrafts[item.id];
    draftHTML = `<div class="draft-box ${isOpen ? "open" : ""}">
      <div class="draft-label">Auto-drafted response</div>
      <div class="draft-content">${escapeHTML(item.draft)}</div>
      <div class="draft-actions">
        <button class="action-btn primary" id="copy-${item.id}" onclick="copyDraft('${item.id}')">Copy to clipboard</button>
        ${item.source_url ? `<a href="${escapeHTML(item.source_url)}" target="_blank" class="action-btn">Open source</a>` : ""}
      </div>
    </div>`;
  }

  return `<div class="card ${isComplete ? "completed" : ""} ${isDismissed ? "dismissed" : ""} ${confClass}" data-bucket="${bucketAttr}">
    <button class="dismiss-btn" title="Dismiss — no longer relevant" onclick="dismissItem('${item.id}')">×</button>
    <div class="card-row">
      <div class="checkbox ${isComplete ? "checked" : ""}" title="Mark complete" onclick="toggleComplete('${item.id}')"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="badge source-${item.source}">${sourceLabel}</span>
          ${fromRyan ? '<span class="badge from-ryan">From Ryan</span>' : ""}
          ${!fromRyan && fromInternal ? '<span class="badge from-internal">Internal</span>' : ""}
          ${priorityLabel ? `<span class="badge priority-${item.priority}">${priorityLabel}</span>` : ""}
          ${item.deadline ? `<span class="badge deadline">⏱ ${escapeHTML(item.deadline)}</span>` : ""}
          ${confidenceHTML}
        </div>
        <div class="task-title">${escapeHTML(item.title)}</div>
        <div class="task-context">${escapeHTML(item.context)}</div>
        ${signalsHTML}
        <div class="task-actions">
          ${item.source_url ? `<a href="${escapeHTML(item.source_url)}" target="_blank" class="action-btn">↗ Open in ${sourceLabel}</a>` : ""}
          ${item.draft ? `<button class="action-btn primary" onclick="toggleDraft('${item.id}')">${openDrafts[item.id] ? "▼ Hide draft" : "▶ View draft"}</button>` : ""}
          ${isHidden ? `<button class="restore-btn" onclick="restoreItem('${item.id}')">↺ Restore</button>` : ""}
        </div>
        ${draftHTML}
        ${articleHTML}
      </div>
    </div>
  </div>`;
}

function isHiddenItem(i) { return i.status === "done" || i.status === "dismissed"; }

function renderArchiveCard(item, kind) {
  // kind: "task" | "project"
  const isProject = kind === "project";
  const sourceLabel = isProject ? "PROJECT" :
    ({ slack: "Slack", gmail: "Gmail", hubspot: "HubSpot", granola: "Granola", nooks: "Nooks" }[item.source] || item.source || "");
  const bucket = isProject ? "project" : (item.bucket || "tasks");
  const bucketLabel = bucket.charAt(0).toUpperCase() + bucket.slice(1);
  const when = item.completed_at || item.last_updated || "";
  const whenLabel = when ? timeAgo(when).replace("Updated ", "") : "";
  const title = isProject ? item.name : item.title;
  return `<div class="archive-card">
    <div class="ac-meta">
      ${!isProject ? `<span class="badge source-${item.source}">${sourceLabel}</span>` : ""}
      <span class="badge bucket-${bucket}">${bucketLabel}</span>
    </div>
    <div class="ac-title">${escapeHTML(title || "(untitled)")}</div>
    <div class="ac-time">${escapeHTML(whenLabel)}</div>
    <div class="ac-actions">
      <button class="ac-restore" onclick="${isProject ? `restoreProject('${item.id}')` : `restoreItem('${item.id}')`}">↺ Restore</button>
    </div>
  </div>`;
}

async function restoreProject(id) {
  const p = allProjects.find(x => x.id === id);
  if (!p) return;
  p.status = "active";
  p.last_updated = new Date().toISOString();
  renderProjects();
  render();
  await postToSheet({ id, target: "projects", status: "active", last_updated: p.last_updated });
}

function renderArchive() {
  const taskItems = allItems.filter(i =>
    i.bucket !== "needs_call" && isHiddenItem(i) && withinArchiveWindow(i.completed_at)
  );
  const completedTasks = taskItems.filter(i => i.status === "done");
  const dismissedTasks = taskItems.filter(i => i.status === "dismissed");

  const completedProjects = allProjects.filter(p =>
    p.status === "complete" && withinArchiveWindow(p.last_updated)
  );

  const totalCompleted = completedTasks.length + completedProjects.length;
  const totalDismissed = dismissedTasks.length;
  const total = totalCompleted + totalDismissed;
  const dismissRate = total > 0 ? Math.round((totalDismissed / total) * 100) : 0;

  const windowLabel = archiveFilter === "all" ? "all time" :
    archiveFilter === "week" ? "the last 7 days" : "the last 30 days";

  let html = `<div class="archive-filters">
    <button class="archive-filter ${archiveFilter === "week" ? "active" : ""}" onclick="setArchiveFilter('week')">This week</button>
    <button class="archive-filter ${archiveFilter === "month" ? "active" : ""}" onclick="setArchiveFilter('month')">This month</button>
    <button class="archive-filter ${archiveFilter === "all" ? "active" : ""}" onclick="setArchiveFilter('all')">All time</button>
  </div>
  <div class="archive-summary">
    <div class="stat-block"><strong>${totalCompleted}</strong>Completed in ${windowLabel}</div>
    <div class="stat-block"><strong>${totalDismissed}</strong>Dismissed in ${windowLabel}</div>
    <div class="stat-block"><strong>${dismissRate}%</strong>Dismissal rate ${dismissRate > 20 ? "(briefing may be noisy)" : "(well-calibrated)"}</div>
  </div>
  <div class="archive-grid">
    <div>
      <div class="archive-col-header completed">Completed <span>${totalCompleted}</span></div>
      ${totalCompleted === 0 ? '<div class="empty-state" style="padding:20px;">Nothing completed in this window.</div>' : ""}
      ${completedTasks.map(i => renderArchiveCard(i, "task")).join("")}
      ${completedProjects.map(p => renderArchiveCard(p, "project")).join("")}
    </div>
    <div>
      <div class="archive-col-header dismissed">Dismissed <span>${totalDismissed}</span></div>
      ${totalDismissed === 0 ? '<div class="empty-state" style="padding:20px;">Nothing dismissed in this window.</div>' : ""}
      ${dismissedTasks.map(i => renderArchiveCard(i, "task")).join("")}
    </div>
  </div>`;
  return html;
}

function hiddenChip(section, count) {
  if (count === 0) return "";
  const active = showHidden[section];
  return ` <button class="hidden-toggle ${active ? "active" : ""}" onclick="toggleHidden('${section}')">${active ? "Hide" : "Show"} ${count} hidden</button>`;
}

function render() {
  const queue = allItems.filter(i => i.bucket === "needs_call");
  const rollover = allItems.filter(i => i.bucket === "rollover");
  const tasks = allItems.filter(i => i.bucket === "tasks");
  const review = allItems.filter(i => i.bucket === "review");
  const fyi = allItems.filter(i => i.bucket === "fyi");

  // Visible-only counts for the tab badges
  document.getElementById("count-queue").textContent = queue.length;
  document.getElementById("count-tasks").textContent = (rollover.filter(i => !isHiddenItem(i)).length) + (tasks.filter(i => !isHiddenItem(i)).length);
  document.getElementById("count-review").textContent = review.filter(i => !isHiddenItem(i)).length;
  document.getElementById("count-fyi").textContent = fyi.filter(i => !isHiddenItem(i)).length;
  const archiveCount = allItems.filter(i => i.bucket !== "needs_call" && isHiddenItem(i) && withinArchiveWindow(i.completed_at)).length
    + allProjects.filter(p => p.status === "complete" && withinArchiveWindow(p.last_updated)).length;
  const countArchiveEl = document.getElementById("count-archive");
  if (countArchiveEl) countArchiveEl.textContent = archiveCount;

  // Sync body classes so hidden cards can be revealed per section via CSS
  document.body.classList.toggle("show-hidden-tasks", showHidden.tasks);
  document.body.classList.toggle("show-hidden-review", showHidden.review);
  document.body.classList.toggle("show-hidden-fyi", showHidden.fyi);

  // Highlight the queue tab if there are items
  const queueTab = document.getElementById("tab-queue");
  if (queue.length > 0) queueTab.classList.add("has-queue");
  else queueTab.classList.remove("has-queue");

  const totalTasks = rollover.length + tasks.length;
  const completed = [...rollover, ...tasks].filter(i => i.status === "done").length;
  document.getElementById("completion-stat").textContent = `${completed}/${totalTasks}`;

  // Hidden counts per section
  const hiddenTasksCount = rollover.filter(isHiddenItem).length + tasks.filter(isHiddenItem).length;
  const hiddenReviewCount = review.filter(isHiddenItem).length;
  const hiddenFyiCount = fyi.filter(isHiddenItem).length;

  let html = "";

  // Queue section — show at top in "all" view, or as the only content in "queue" view
  if (currentTab === "all" || currentTab === "queue") {
    if (queue.length > 0) {
      html += `<div class="section-header queue">
        <span class="dot"></span>
        Needs your call · ${queue.length} ${queue.length === 1 ? "item" : "items"} to classify
        <span class="help-text">Your answers train the system — by week 3 this section should be near empty</span>
      </div>`;
      html += queue.map(i => renderQueueCard(i)).join("");
    } else if (currentTab === "queue") {
      html += '<div class="empty-state">No questions today. The system is confident in its classifications.</div>';
    }
  }

  if (currentTab === "all" || currentTab === "tasks") {
    if (rollover.length > 0) {
      html += '<div class="section-header rollover"><span class="dot"></span>Rollover from yesterday</div>';
      html += rollover.map(i => renderCard(i, true)).join("");
    }
    if (tasks.length > 0) {
      html += `<div class="section-header"><span class="dot"></span>Today's tasks · ranked by priority${hiddenChip("tasks", hiddenTasksCount)}</div>`;
      html += tasks.map(i => renderCard(i, true)).join("");
    } else if (hiddenTasksCount > 0) {
      // Tasks section is empty but there are hidden items — still show the chip
      html += `<div class="section-header"><span class="dot"></span>Today's tasks${hiddenChip("tasks", hiddenTasksCount)}</div>`;
      html += rollover.filter(isHiddenItem).map(i => renderCard(i, true)).join("");
    }
    if (rollover.length === 0 && tasks.length === 0 && currentTab === "tasks") {
      html += '<div class="empty-state">No tasks yet. Either you\'re crushing it or the 2pm pull hasn\'t run.</div>';
    }
  }
  if (currentTab === "all" || currentTab === "review") {
    const visibleReview = review.filter(i => !isHiddenItem(i));
    if (review.length > 0) {
      html += `<div class="section-header"><span class="dot"></span>Review · signals worth deciding on${hiddenChip("review", hiddenReviewCount)}</div>`;
      html += review.map(i => renderCard(i, false)).join("");
    } else if (currentTab === "review") {
      html += '<div class="empty-state">No signals to review.</div>';
    }
  }
  if (currentTab === "all" || currentTab === "fyi") {
    if (fyi.length > 0) {
      html += `<div class="section-header"><span class="dot"></span>FYI · context, no action needed${hiddenChip("fyi", hiddenFyiCount)}</div>`;
      html += fyi.map(i => renderCard(i, false)).join("");
    } else if (currentTab === "fyi") {
      html += '<div class="empty-state">No FYI items today.</div>';
    }
  }
  if (currentTab === "archive") {
    html = renderArchive();
  }

  document.getElementById("board").innerHTML = html || '<div class="empty-state">No data yet. Run your Cowork task to populate the board.</div>';
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
